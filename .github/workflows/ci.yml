name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege: the test job only needs to read the repo.
permissions:
  contents: read

jobs:
  test:
    name: Tests (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Native TypeScript type-stripping requires Node >= 22.6.
        node: ["22", "24"]
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}

      - name: Frontend syntax check
        run: node --check public/app.js

      - name: Type-check server modules (strip-types)
        run: node --experimental-strip-types --check src/server.ts

      - name: Unit tests
        run: node --experimental-strip-types --test 'test/**/*.test.ts'
