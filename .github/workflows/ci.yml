name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege: every job only needs to read the repo.
permissions:
  contents: read

jobs:
  test:
    name: Tests (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Native TypeScript type-stripping requires Node >= 22.6.
        node: ["22", "24"]
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}
      - name: Frontend syntax check
        run: node --check public/app.js
      - name: Type-check server modules (strip-types)
        run: node --experimental-strip-types --check src/server.ts
      - name: Unit tests
        run: node --experimental-strip-types --test 'test/**/*.test.ts'

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
      # Node only measures modules the tests load, i.e. the unit-tested logic
      # (including the critical paths.ts / redact.ts). I/O glue (server, files,
      # settings, history, extensions, audit handler) is covered by the e2e /
      # smoke checks instead. Gate: lines >= 90, branches >= 88, functions >= 95.
      - name: Coverage gate
        run: >
          node --experimental-strip-types --test --experimental-test-coverage
          --test-coverage-lines=90
          --test-coverage-branches=88
          --test-coverage-functions=95
          'test/**/*.test.ts'

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    env:
      GITLEAKS_VERSION: "8.30.1"
      GITLEAKS_SHA256: "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - name: Install gitleaks (pinned + checksum-verified)
        run: |
          set -euo pipefail
          curl -fsSL -o gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          echo "${GITLEAKS_SHA256}  gitleaks.tar.gz" | sha256sum -c -
          tar -xzf gitleaks.tar.gz gitleaks
      - name: Scan history for secrets
        run: ./gitleaks detect --source . --redact --no-banner --verbose --exit-code 1
